<section class="insights-section">
  <div class="section-header">
    <h2>Latest Property Insights</h2>
    <p>Market trends & investment updates</p>
  </div>

  <div class="insights-grid">
    <div *ngFor="let post of posts" class="insight-card">
      <h3>{{ post.title }}</h3>
      <p>{{ post.body }}</p>
    </div>
  </div>
</section>
